<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1A3A5C">
    <title>LPXConstrutor</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCnSISQpOEO0jcPYkzFySU8BFYtNNhYwSM&libraries=places"></script>
    
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        
        <!-- ===== HEADER ===== -->
        <header class="app-header">
            <div class="header-content">
                <h1>🏗️ LPXCONSTRUTOR</h1>
                <div class="header-actions">
                    <button class="icon-btn" onclick="app.mostrarNotificacoes()">
                        <i class="fas fa-bell"></i>
                        <span class="badge-notification" id="badgeNotificacoes" style="display:none;">0</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- ===== TOAST ===== -->
        <div class="toast" id="toast"></div>

        <!-- ===== TELA DE LOGIN ===== -->
        <div class="screen active" id="loginScreen">
            <div class="login-container">
                <div class="login-logo">🏗️</div>
                <h2>LPXConstrutor</h2>
                <p class="login-subtitle">Rede Profissional da Construção</p>
                
                <div class="card">
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" class="input-field" id="loginEmail" placeholder="seu@email.com">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Senha</label>
                        <input type="password" class="input-field" id="loginSenha" placeholder="Sua senha">
                    </div>
                    
                    <button class="btn btn-primary" onclick="app.fazerLogin()">
                        <i class="fas fa-sign-in-alt"></i> ENTRAR
                    </button>
                    
                    <button class="btn btn-outline" onclick="app.mostrarTela('cadastroScreen')">
                        <i class="fas fa-user-plus"></i> Criar Conta
                    </button>
                </div>
            </div>
        </div>

        <!-- ===== TELA DE CADASTRO ===== -->
        <div class="screen" id="cadastroScreen">
            <div class="screen-header">
                <button class="btn-voltar" onclick="app.mostrarTela('loginScreen')">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2>Criar Conta</h2>
            </div>
            
            <div class="card">
                <!-- Etapa 1: Dados Básicos -->
                <div id="etapa1">
                    <h3>Dados Pessoais</h3>
                    
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Nome Completo</label>
                        <input type="text" class="input-field" id="cadNome" placeholder="Seu nome completo">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" class="input-field" id="cadEmail" placeholder="seu@email.com">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-phone"></i> WhatsApp</label>
                        <input type="tel" class="input-field" id="cadCelular" placeholder="(11) 99999-9999">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-id-card"></i> CPF</label>
                        <input type="text" class="input-field" id="cadCPF" placeholder="000.000.000-00">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Senha</label>
                        <input type="password" class="input-field" id="cadSenha" placeholder="Mínimo 6 caracteres">
                    </div>
                    
                    <button class="btn btn-primary" onclick="app.proximaEtapa(2)">
                        PRÓXIMO <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
                
                <!-- Etapa 2: Profissão -->
                <div id="etapa2" style="display:none;">
                    <h3>Dados Profissionais</h3>
                    
                    <div class="input-group">
                        <label><i class="fas fa-building"></i> Tipo de Conta</label>
                        <select class="input-field" id="cadTipo" onchange="app.toggleProfissao()">
                            <option value="profissional">👷 Profissional</option>
                            <option value="empreiteiro">🏢 Empreiteiro</option>
                        </select>
                    </div>
                    
                    <div id="grupoProfissao">
                        <div class="input-group">
                            <label><i class="fas fa-tools"></i> Profissão</label>
                            <select class="input-field" id="cadProfissao">
                                <option value="">Selecione...</option>
                                <option value="servente">Servente</option>
                                <option value="pedreiro">Pedreiro</option>
                                <option value="carpinteiro">Carpinteiro</option>
                                <option value="armador">Armador</option>
                                <option value="encanador">Encanador</option>
                                <option value="eletricista">Eletricista</option>
                                <option value="pintor">Pintor</option>
                                <option value="gesseiro">Gesseiro</option>
                                <option value="azulejista">Azulejista</option>
                                <option value="telhadista">Telhadista</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-calendar"></i> Anos de Experiência</label>
                        <input type="number" class="input-field" id="cadExperiencia" placeholder="5" min="0" max="50">
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-star"></i> Habilidades</label>
                        <textarea class="input-field" id="cadHabilidades" rows="3" placeholder="Ex: Assentamento de pisos, reboco, pintura..."></textarea>
                    </div>
                    
                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-outline" onclick="app.proximaEtapa(1)" style="flex:1;">
                            <i class="fas fa-arrow-left"></i> VOLTAR
                        </button>
                        <button class="btn btn-primary" onclick="app.cadastrar()" style="flex:1;">
                            <i class="fas fa-check"></i> FINALIZAR
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== TELA HOME (FEED) ===== -->
        <div class="screen" id="homeScreen">
            <!-- Mapa -->
            <div class="mapa-container">
                <div id="map"></div>
            </div>
            
            <!-- Tabs -->
            <div class="tabs-container">
                <button class="tab active" onclick="app.mudarTab('feed')">
                    <i class="fas fa-newspaper"></i> Feed
                </button>
                <button class="tab" onclick="app.mudarTab('rede')">
                    <i class="fas fa-users"></i> Rede
                </button>
            </div>
            
            <!-- Feed de Vagas -->
            <div id="feedContainer" class="feed-container"></div>
            
            <!-- Minha Rede -->
            <div id="redeContainer" class="feed-container" style="display:none;"></div>
        </div>

        <!-- ===== TELA DE BUSCA ===== -->
        <div class="screen" id="buscaScreen">
            <div class="screen-header">
                <button class="btn-voltar" onclick="app.mostrarTela('homeScreen')">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2>Buscar Profissionais</h2>
            </div>
            
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="buscaInput" 
                       placeholder="Nome ou profissão..." oninput="app.buscarProfissionais()">
            </div>
            
            <div id="buscaResultados" class="feed-container"></div>
        </div>

        <!-- ===== TELA DE PERFIL PÚBLICO ===== -->
        <div class="screen" id="perfilPublicoScreen">
            <div class="screen-header">
                <button class="btn-voltar" onclick="history.back()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2>Perfil</h2>
            </div>
            <div id="perfilPublicoConteudo"></div>
        </div>

        <!-- ===== TELA MEU PERFIL ===== -->
        <div class="screen" id="meuPerfilScreen">
            <div class="profile-header-container">
                <div class="profile-cover"></div>
                <div class="profile-avatar-container">
                    <div class="profile-avatar" onclick="document.getElementById('inputFoto').click()">
                        <i class="fas fa-camera"></i>
                    </div>
                    <input type="file" id="inputFoto" accept="image/*" style="display:none" onchange="app.uploadFoto(event)">
                </div>
            </div>
            
            <div class="profile-info-card">
                <h2 id="meuPerfilNome"></h2>
                <p id="meuPerfilProfissao"></p>
                <div id="meuPerfilAvaliacao" class="stars-container"></div>
            </div>
            
            <div class="card">
                <h3><i class="fas fa-edit"></i> Editar Informações</h3>
                
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" class="input-field" id="editNome">
                </div>
                
                <div class="input-group">
                    <label>WhatsApp</label>
                    <input type="tel" class="input-field" id="editCelular">
                </div>
                
                <div class="input-group">
                    <label>Habilidades</label>
                    <textarea class="input-field" id="editHabilidades" rows="3"></textarea>
                </div>
                
                <button class="btn btn-primary" onclick="app.salvarPerfil()">
                    <i class="fas fa-save"></i> SALVAR
                </button>
            </div>
            
            <button class="btn btn-danger" onclick="app.sair()">
                <i class="fas fa-sign-out-alt"></i> SAIR
            </button>
        </div>

        <!-- ===== TELA DE CHAT ===== -->
        <div class="screen" id="chatScreen">
            <div class="screen-header">
                <button class="btn-voltar" onclick="app.mostrarTela('homeScreen')">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div id="chatHeaderInfo"></div>
            </div>
            
            <div class="chat-messages" id="chatMessages"></div>
            
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Digite sua mensagem...">
                <button class="btn-send" onclick="app.enviarMensagem()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <!-- ===== TELA DE NOTIFICAÇÕES ===== -->
        <div class="screen" id="notificacoesScreen">
            <div class="screen-header">
                <button class="btn-voltar" onclick="app.mostrarTela('homeScreen')">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h2>Notificações</h2>
            </div>
            <div id="notificacoesContainer"></div>
        </div>

        <!-- ===== BOTTOM NAV ===== -->
        <nav class="bottom-nav" id="bottomNav">
            <button class="nav-item active" onclick="app.mostrarTela('homeScreen')">
                <i class="fas fa-home"></i>
                <span>Início</span>
            </button>
            <button class="nav-item" onclick="app.mostrarTela('buscaScreen')">
                <i class="fas fa-search"></i>
                <span>Buscar</span>
            </button>
            <button class="nav-item" onclick="app.publicarVaga()">
                <i class="fas fa-plus-circle"></i>
                <span>Publicar</span>
            </button>
            <button class="nav-item" onclick="app.mostrarTela('chatScreen')">
                <i class="fas fa-comments"></i>
                <span>Chat</span>
            </button>
            <button class="nav-item" onclick="app.mostrarTela('meuPerfilScreen')">
                <i class="fas fa-user"></i>
                <span>Perfil</span>
            </button>
        </nav>

    </div>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/database.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/mapa.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
